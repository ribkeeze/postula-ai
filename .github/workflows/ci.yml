name: Flutter CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  flutter_ci:
    name: Analyze, test & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (freezed, riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate placeholder firebase_options.dart for CI
        run: |
          cat > lib/firebase_options.dart << 'EOF'
          // CI placeholder — real file is gitignored, generated by FlutterFire CLI.
          // ignore_for_file: type=lint
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart'
              show defaultTargetPlatform, kIsWeb, TargetPlatform;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              if (kIsWeb) return web;
              switch (defaultTargetPlatform) {
                case TargetPlatform.android:
                  return android;
                case TargetPlatform.iOS:
                  return ios;
                case TargetPlatform.macOS:
                  return macos;
                case TargetPlatform.windows:
                  return windows;
                default:
                  return android;
              }
            }

            static const FirebaseOptions web = FirebaseOptions(
              apiKey: 'fake-api-key',
              appId: 'fake-app-id',
              messagingSenderId: 'fake-sender-id',
              projectId: 'fake-project-id',
              authDomain: 'fake-project.firebaseapp.com',
              storageBucket: 'fake-project.firebasestorage.app',
            );

            static const FirebaseOptions android = FirebaseOptions(
              apiKey: 'fake-api-key',
              appId: 'fake-app-id',
              messagingSenderId: 'fake-sender-id',
              projectId: 'fake-project-id',
              storageBucket: 'fake-project.firebasestorage.app',
            );

            static const FirebaseOptions ios = FirebaseOptions(
              apiKey: 'fake-api-key',
              appId: 'fake-app-id',
              messagingSenderId: 'fake-sender-id',
              projectId: 'fake-project-id',
              storageBucket: 'fake-project.firebasestorage.app',
              iosClientId: 'fake-ios-client-id',
              iosBundleId: 'com.example.postulaAi',
            );

            static const FirebaseOptions macos = FirebaseOptions(
              apiKey: 'fake-api-key',
              appId: 'fake-app-id',
              messagingSenderId: 'fake-sender-id',
              projectId: 'fake-project-id',
              storageBucket: 'fake-project.firebasestorage.app',
              iosClientId: 'fake-ios-client-id',
              iosBundleId: 'com.example.postulaAi',
            );

            static const FirebaseOptions windows = FirebaseOptions(
              apiKey: 'fake-api-key',
              appId: 'fake-app-id',
              messagingSenderId: 'fake-sender-id',
              projectId: 'fake-project-id',
              authDomain: 'fake-project.firebaseapp.com',
              storageBucket: 'fake-project.firebasestorage.app',
            );
          }
          EOF

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Format check
        run: dart format --set-exit-if-changed lib/ test/

      - name: Run unit & widget tests
        run: flutter test test/unit test/widget_test.dart --coverage

      # Threshold is intentionally low — current coverage reflects 1 unit test file
      # + 1 widget smoke test. Raise incrementally as test suite grows.
      # Threshold is intentionally low — current coverage reflects 1 unit test file
      # + 1 widget smoke test. Raise incrementally as test suite grows.
      - name: Report coverage (threshold 1%)
        run: |
          sudo apt-get install -y lcov
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | grep -oP '\d+\.\d+' | head -1)
          echo "Coverage: $COVERAGE%"
          python3 -c "
          cov = float('$COVERAGE')
          if cov < 1:
              print(f'Coverage {cov}% is below 1% minimum threshold')
              exit(1)
          print(f'Coverage {cov}% passes threshold')
          "

  functions_ci:
    name: TypeScript functions check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        working-directory: functions
        run: npm ci

      - name: TypeScript check
        working-directory: functions
        run: npm run build
