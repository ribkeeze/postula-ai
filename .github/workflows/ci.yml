name: Flutter CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  flutter_ci:
    name: Analyze, test & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (freezed, riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Format check
        run: dart format --set-exit-if-changed lib/ test/

      - name: Run unit & widget tests
        run: flutter test test/unit test/widget --coverage

      - name: Check coverage threshold (70%)
        run: |
          sudo apt-get install -y lcov
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | grep -oP '\d+\.\d+' | head -1)
          echo "Coverage: $COVERAGE%"
          python3 -c "
          cov = float('$COVERAGE')
          if cov < 70:
              print(f'Coverage {cov}% is below 70% threshold')
              exit(1)
          print(f'Coverage {cov}% passes threshold')
          "

  functions_ci:
    name: TypeScript functions check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        working-directory: functions
        run: npm ci

      - name: TypeScript check
        working-directory: functions
        run: npm run build
