name: postula_ai
description: La herramienta de búsqueda laboral con IA para todos los argentinos.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  cloud_functions: ^6.2.0
  google_sign_in: ^7.2.0

  # State management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Data / models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  dartz: ^0.10.1
  equatable: ^2.0.7

  # Navigation
  go_router: ^17.2.3

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.2

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  gap: ^3.0.1

  # Utils
  logger: ^2.4.0
  uuid: ^4.5.1
  intl: ^0.20.2
  share_plus: ^13.1.0
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  flutter_file_saver: ^0.9.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.0.0
  package_info_plus: ^10.1.0

  # ── Monetización ─────────────────────────────────────────────────────────
  # Anuncios - Google AdMob
  google_mobile_ads: ^8.0.0

  # Suscripciones - RevenueCat (maneja Google Play + App Store billing)
  purchases_flutter: ^10.0.1

  #Phone nmumber
  intl_phone_field: ^3.2.0
  firebase_app_check: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^3.2.3
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.0+1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

  # Testing
  mocktail: ^1.0.4
  fake_cloud_firestore: ^4.1.0+1
  firebase_auth_mocks: ^0.15.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
